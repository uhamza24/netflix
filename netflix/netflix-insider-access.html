<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Early Access Program</title>
    
    <!-- Core Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-red': '#E50914',
                    }
                }
            }
        }
    </script>
    
    <style>
        /* CRITICAL BLOGGER OVERRIDES */
        /* These styles force Blogger to hide its default theme elements */
        body, html { margin: 0 !important; padding: 0 !important; background-color: #000 !important; width: 100% !important; height: 100% !important; overflow-x: hidden !important; }
        #header-wrapper, #sidebar-wrapper, .header-outer, .footer-outer, .sidebar-content, .comments, .post-footer, .blog-pager { display: none !important; }
        .main-inner, .column-center-inner, .content-inner, .post-body { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
        
        /* App Styles */
        body { font-family: 'Inter', sans-serif; color: white; -webkit-font-smoothing: antialiased; }
        .cinematic-glow { background: radial-gradient(circle at 50% -20%, rgba(229, 9, 20, 0.25) 0%, rgba(0, 0, 0, 0) 70%); }
        .bg-radial-vignette { background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,1) 100%); }
        .btn-shadow { box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        .btn-shadow:hover { box-shadow: 0 0 45px rgba(229, 9, 20, 0.7); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes drift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, -30px); } }
        @keyframes subtleDrift { 0%, 100% { transform: perspective(1000px) rotateX(15deg) scale(1.1) translate(0, 0); } 50% { transform: perspective(1000px) rotateX(15deg) scale(1.12) translate(-10px, -10px); } }
        @keyframes subtlePulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.03); filter: brightness(1.1); } }

        .animate-fade-in-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-down { animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-drift { animation: drift 20s ease-in-out infinite; }
        .animate-subtle-drift { animation: subtleDrift 30s ease-in-out infinite; }
        .animate-subtle-pulse { animation: subtlePulse 4s ease-in-out infinite; }

        .reveal { opacity: 0; transform: translateY(50px); transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        ::selection { background: #E50914; color: white; }
    </style>
</head>
<body>
    <!-- Main Mount Point -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BackgroundGlow = () => (
            <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                <div className="absolute inset-0 z-0 opacity-60 transition-opacity duration-1000">
                    <div 
                        className="absolute inset-[-10%] bg-cover bg-center animate-subtle-drift"
                        style={{
                            backgroundImage: `url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=100&w=2560&auto=format&fit=crop')`,
                            transform: 'perspective(1000px) rotateX(15deg) scale(1.1)',
                            filter: 'brightness(0.45) saturate(1.2) contrast(1.1)' 
                        }}
                    />
                    <div className="absolute inset-0" style={{
                        backgroundImage: `linear-gradient(to right, rgba(0,0,0,1) 0%, transparent 10%, transparent 90%, rgba(0,0,0,1) 100%), 
                                          linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 15%, transparent 85%, rgba(0,0,0,1) 100%)`,
                    }} />
                </div>
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[800px] cinematic-glow opacity-30 z-10" />
                <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90 z-20" />
                <div className="absolute inset-0 bg-radial-vignette opacity-70 z-20" />
                <div className="absolute top-[15%] -left-[10%] w-[500px] h-[500px] bg-red-900/10 rounded-full blur-[140px] animate-drift z-30" />
                <div className="absolute top-[40%] -right-[15%] w-[600px] h-[600px] bg-red-800/5 rounded-full blur-[160px] animate-drift z-30" style={{ animationDirection: 'reverse', animationDuration: '20s' }} />
            </div>
        );

        const Navbar = () => (
            <nav className="relative z-50 w-full px-6 py-6 md:px-12 flex items-center justify-between opacity-0 animate-slide-down">
                <div className="flex items-center gap-4 group cursor-pointer">
                    <div className="relative w-6 h-10 md:w-7 md:h-11 transition-transform duration-500 group-hover:scale-110 flex items-center justify-center">
                        <svg className="w-full h-full drop-shadow-[0_0_15px_rgba(229,9,20,0.6)]" viewBox="0 0 24 40" fill="none">
                            <path d="M5.6 36.3V0H0V40H0.1L5.6 36.3Z" fill="#E50914"/>
                            <path d="M24 40H18.4V3.7L24 0V40Z" fill="#E50914"/>
                            <path d="M18.4 40H24L5.6 0H0L18.4 40Z" fill="#B20710"/>
                        </svg>
                    </div>
                    <div className="flex flex-col justify-center">
                        <span className="text-[10px] md:text-xs font-black tracking-[0.3em] text-netflix-red leading-none">EARLY ACCESS</span>
                        <span className="text-[8px] font-bold tracking-[0.1em] text-white/30 uppercase mt-1">Beta Program</span>
                    </div>
                </div>
                <div className="flex items-center gap-4 md:gap-6">
                    <a href="#" className="text-sm font-medium text-white/80 hover:text-white transition-colors hidden md:block">Log In</a>
                    <button className="bg-transparent border border-white/20 px-5 py-2 rounded text-sm font-bold hover:bg-white/10 hover:border-white/40 transition-all uppercase tracking-wider text-white">Support</button>
                </div>
            </nav>
        );

        const Hero = () => {
            const [isTutorialOpen, setIsTutorialOpen] = useState(false);
            return (
                <section className="relative z-10 pt-16 md:pt-20 pb-24 md:pb-40 px-6 md:px-12 flex flex-col items-center text-center">
                    <div className="max-w-4xl w-full">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-500/10 border border-red-500/20 mb-6 md:mb-8 opacity-0 animate-fade-in-up">
                            <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse" />
                            <span className="text-[10px] md:text-xs font-bold tracking-widest text-red-500 uppercase">Exclusive Invitation Only</span>
                        </div>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black tracking-tight leading-[1.1] mb-6 md:mb-8 bg-gradient-to-b from-white to-white/70 bg-clip-text text-transparent opacity-0 animate-fade-in-up">
                            Watch Unreleased <br className="hidden md:block" /> Movies & Series Before <br className="hidden md:block" /> the World.
                        </h1>
                        <p className="text-base md:text-lg lg:text-xl text-white/60 max-w-2xl mx-auto leading-relaxed mb-8 md:mb-12 opacity-0 animate-fade-in-up">
                            Join the Netflix Early Access Program and get exclusive previews, private screenings, and insider content before they hit the mainstream.
                        </p>
                        <div className="flex flex-col items-center gap-6 opacity-0 animate-fade-in-up">
                            <div className="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                                <button className="w-full sm:w-auto group relative flex items-center justify-center gap-3 bg-[#E50914] text-white px-8 py-4 md:py-5 rounded text-lg md:text-xl font-extrabold transition-all duration-500 transform hover:scale-105 btn-shadow active:scale-95 animate-subtle-pulse">
                                    Apply Now
                                    <svg className="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 5l7 7-7 7" />
                                    </svg>
                                </button>
                                <button onClick={() => setIsTutorialOpen(!isTutorialOpen)} className={`w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-4 md:py-5 rounded text-sm md:text-base font-bold transition-all border ${isTutorialOpen ? 'bg-white/10 border-white/40 text-white' : 'bg-white/5 border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`}>
                                    How it Works
                                </button>
                            </div>
                            <div className={`w-full max-w-md overflow-hidden transition-all duration-700 ${isTutorialOpen ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                <div className="bg-[#050505] border border-white/10 rounded-[2rem] p-8 text-left mt-6">
                                    <h3 className="text-white font-bold mb-6 text-xl">Process Overview</h3>
                                    <ul className="space-y-6">
                                        <li><p className="text-white font-bold">1. Apply 📝</p><p className="text-white/40 text-sm">Click apply and fill out your viewing preferences.</p></li>
                                        <li><p className="text-white font-bold">2. Verify Process ✅</p><p className="text-white/40 text-sm">Install our sponsor app and open it for 30 seconds to get exclusive access from sponsor.</p></li>
                                        <li><p className="text-white font-bold">3. Access ✅</p><p className="text-white/40 text-sm">Get your unique credentials and start watching.</p></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const TrendingSection = () => {
            const trendingData = [
                { id: 1, title: "Stranger Things", imageUrl: "https://i.postimg.cc/zXkmfyhs/AAAABet-Fcud-Ulahd-Uopqq-RZd-ZHqahm-BBXOepf-Xu-PV5n985g-Sv-EJq5zrkhrw-K8VA3v-WAKfn-GYl-TOL-y-Ji7RQQi.jpg", hasNew: true },
                { id: 2, title: "Cyberpunk Edge", imageUrl: "https://i.postimg.cc/q7WBGN1M/latest.png" },
                { id: 3, title: "Gothic Nights", imageUrl: "https://i.postimg.cc/k4Msf5Gp/111.jpg" },
                { id: 4, title: "The Last Frontier", imageUrl: "https://i.postimg.cc/hvDj5f7y/daredevil-born-again-season-2-ep.png" },
                { id: 5, title: "The Witcher", imageUrl: "https://i.postimg.cc/QVL0kGzw/ems-c-HJk-LWVtcy1hc3Nld-HMvd-HZz-ZXJp.png" }
            ];
            return (
                <section className="relative z-10 pt-20 pb-0 bg-black">
                    <div className="px-6 md:px-12">
                        <h2 className="text-xl md:text-2xl font-bold mb-8 text-white/90">Trending in <span className="text-netflix-red">Early Access</span></h2>
                        <div className="flex gap-4 md:gap-6 pb-12 overflow-x-auto no-scrollbar">
                            {trendingData.map((item) => (
                                <div key={item.id} className="relative flex-none w-[130px] md:w-[180px] group transition-transform hover:scale-105">
                                    <div className="relative aspect-[2/3] rounded-md overflow-hidden border border-white/5 bg-zinc-900 shadow-xl">
                                        <img src={item.imageUrl} alt={item.title} className="w-full h-full object-cover" />
                                        {item.hasNew && <div className="absolute bottom-2 left-0 right-0 px-2"><div className="bg-netflix-red text-white text-[9px] font-black py-1 rounded text-center uppercase tracking-tighter">New Episode</div></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ReviewSection = () => {
            const reviews = [
                { id: 1, name: "Marcus Chen", time: "2h", likes: "1.2K", text: "GUYS IT'S REAL! 😱 Just got my unique login. I'm literally watching the unreleased show Stranger Things: Tales from ’85 right now. DO IT NOW! 🍿🔥", av: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=100&w=200&auto=format&fit=crop" },
                { id: 2, name: "Sarah Jenkins", time: "5h", likes: "854", text: "Watching episode 9 season 5 of stranger things before my friends even know it exists is the ultimate flex. ✅", av: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=100&w=200&auto=format&fit=crop" },
                { id: 3, name: "David V.", time: "12h", likes: "2.4K", text: "Exclusive screenings are top-notch. Feedback matters! Thank you Netflix! 🙏✨", av: "https://images.unsplash.com/photo-1552058544-f2b08422138a?q=100&w=200&auto=format&fit=crop" },
                { id: 4, name: "Elena Rodriguez", time: "1d", likes: "612", text: "The bridgerton season 4 part 2 preview was breathtaking. Being an Insider feels so premium. 🎬❤️ #EarlyAccess", av: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=100&w=200&auto=format&fit=crop" },
                { id: 5, name: "Liam O'Connor", time: "2d", likes: "1.5K", text: "Verification was fast. Credentials arrived in 2 days. Best decision ever! ❄️📺", av: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=100&w=200&auto=format&fit=crop" }
            ];
            return (
                <section className="relative z-10 pt-12 pb-10 px-6 md:px-12 bg-black overflow-hidden">
                    <div className="max-w-6xl mx-auto">
                        <h2 className="text-2xl md:text-3xl font-black text-white mb-12">Accepted Members <span className="text-white/40">& Reviewers</span></h2>
                        <div className="flex gap-6 overflow-x-auto no-scrollbar pb-10 -mx-6 px-6">
                            {reviews.map((r, i) => (
                                <div key={i} className="flex-none w-[82vw] sm:w-[380px] bg-[#18191a] border border-white/5 rounded-xl shadow-2xl reveal flex flex-col">
                                    <div className="p-4 flex items-center gap-3">
                                        <img src={r.av} className="w-10 h-10 rounded-full" />
                                        <div><h4 className="text-[15px] font-bold text-[#e4e6eb]">{r.name}</h4><p className="text-[13px] text-[#b0b3b8]">{r.time} · Global</p></div>
                                    </div>
                                    <div className="px-4 pb-4 text-[15px] text-[#e4e6eb] flex-grow">{r.text}</div>
                                    <div className="p-4 flex items-center justify-between border-t border-white/5">
                                        <span className="text-[14px] text-[#b0b3b8]">{r.likes} Likes</span>
                                        <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white/5 border border-white/10"><div className="w-1.5 h-1.5 rounded-full bg-[#00b67a] animate-pulse" /><span className="text-[8px] font-black text-white uppercase">Insider</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('visible'));
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="relative min-h-screen bg-black text-white selection:bg-netflix-red/30">
                    <BackgroundGlow />
                    <Navbar />
                    <main>
                        <Hero />
                        <TrendingSection />
                        <ReviewSection />
                    </main>
                    <footer className="relative z-10 py-12 px-6 border-t border-white/5 bg-black text-center text-xs text-white/20 uppercase tracking-[0.2em]">© 2025 Netflix Early Access. Fictional Program.</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
