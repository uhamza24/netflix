<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Early Access Program</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-red': '#E50914',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #000;
            color: white;
        }
        
        .cinematic-glow {
            background: radial-gradient(circle at 50% -20%, rgba(229, 9, 20, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .bg-radial-vignette {
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,1) 100%);
        }
        .btn-shadow {
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }
        .btn-shadow:hover {
            box-shadow: 0 0 45px rgba(229, 9, 20, 0.7);
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -30px); }
        }

        @keyframes subtleDrift {
            0%, 100% { transform: perspective(1000px) rotateX(15deg) scale(1.1) translate(0, 0); }
            50% { transform: perspective(1000px) rotateX(15deg) scale(1.12) translate(-10px, -10px); }
        }

        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.1); }
        }

        .animate-fade-in-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-down { animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-drift { animation: drift 20s ease-in-out infinite; }
        .animate-subtle-drift { animation: subtleDrift 30s ease-in-out infinite; }
        .animate-subtle-pulse { animation: subtlePulse 4s ease-in-out infinite; }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        ::selection {
            background: #E50914;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BackgroundGlow = () => (
            <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                <div className="absolute inset-0 z-0 opacity-60 transition-opacity duration-1000">
                    <div 
                        className="absolute inset-[-10%] bg-cover bg-center animate-subtle-drift"
                        style={{
                            backgroundImage: `url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=100&w=2560&auto=format&fit=crop')`,
                            transform: 'perspective(1000px) rotateX(15deg) scale(1.1)',
                            filter: 'brightness(0.45) saturate(1.2) contrast(1.1)' 
                        }}
                    />
                    <div className="absolute inset-0" style={{
                        backgroundImage: `linear-gradient(to right, rgba(0,0,0,1) 0%, transparent 10%, transparent 90%, rgba(0,0,0,1) 100%), 
                                          linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 15%, transparent 85%, rgba(0,0,0,1) 100%)`,
                    }} />
                </div>
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[800px] cinematic-glow opacity-30 z-10" />
                <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90 z-20" />
                <div className="absolute inset-0 bg-radial-vignette opacity-70 z-20" />
                <div className="absolute top-[15%] -left-[10%] w-[500px] h-[500px] bg-red-900/10 rounded-full blur-[140px] animate-drift z-30" />
                <div className="absolute top-[40%] -right-[15%] w-[600px] h-[600px] bg-red-800/5 rounded-full blur-[160px] animate-drift z-30" style={{ animationDirection: 'reverse', animationDuration: '20s' }} />
            </div>
        );

        const Navbar = () => (
            <nav className="relative z-50 w-full px-6 py-6 md:px-12 flex items-center justify-between opacity-0 animate-slide-down">
                <div className="flex items-center gap-4 group cursor-pointer">
                    <div className="relative w-6 h-10 md:w-7 md:h-11 transition-transform duration-500 group-hover:scale-110 flex items-center justify-center">
                        <svg className="w-full h-full drop-shadow-[0_0_15px_rgba(229,9,20,0.6)]" viewBox="0 0 24 40" fill="none">
                            <path d="M5.6 36.3V0H0V40H0.1L5.6 36.3Z" fill="#E50914"/>
                            <path d="M24 40H18.4V3.7L24 0V40Z" fill="#E50914"/>
                            <path d="M18.4 40H24L5.6 0H0L18.4 40Z" fill="#B20710"/>
                        </svg>
                    </div>
                    <div className="flex flex-col justify-center">
                        <span className="text-[10px] md:text-xs font-black tracking-[0.3em] text-netflix-red leading-none">EARLY ACCESS</span>
                        <span className="text-[8px] font-bold tracking-[0.1em] text-white/30 uppercase mt-1">Beta Program</span>
                    </div>
                </div>
                <div className="flex items-center gap-4 md:gap-6">
                    <a href="#" className="text-sm font-medium text-white/80 hover:text-white transition-colors hidden md:block">Log In</a>
                    <button className="bg-transparent border border-white/20 px-5 py-2 rounded text-sm font-bold hover:bg-white/10 hover:border-white/40 transition-all uppercase tracking-wider text-white">Support</button>
                </div>
            </nav>
        );

        const Hero = () => {
            const [isTutorialOpen, setIsTutorialOpen] = useState(false);
            const [timeLeft, setTimeLeft] = useState(86400);

            useEffect(() => {
                const timer = setInterval(() => setTimeLeft(p => p > 0 ? p - 1 : 86400), 1000);
                return () => clearInterval(timer);
            }, []);

            const h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
            const m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');

            const handleApply = () => window.open('https://forms.gle/placeholder-link', '_blank');
            const toggleTutorial = () => setIsTutorialOpen(!isTutorialOpen);

            return (
                <section className="relative z-10 pt-16 md:pt-20 pb-24 md:pb-40 px-6 md:px-12 flex flex-col items-center text-center">
                    <div className="max-w-4xl w-full">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-500/10 border border-red-500/20 mb-6 md:mb-8 opacity-0 animate-fade-in-up">
                            <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse" />
                            <span className="text-[10px] md:text-xs font-bold tracking-widest text-red-500 uppercase">Exclusive Invitation Only</span>
                        </div>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black tracking-tight leading-[1.1] mb-6 md:mb-8 bg-gradient-to-b from-white to-white/70 bg-clip-text text-transparent opacity-0 animate-fade-in-up">
                            Watch Unreleased <br className="hidden md:block" /> Movies & Series Before <br className="hidden md:block" /> the World.
                        </h1>
                        <p className="text-base md:text-lg lg:text-xl text-white/60 max-w-2xl mx-auto leading-relaxed mb-8 md:mb-12 opacity-0 animate-fade-in-up">
                            Join the Netflix Early Access Program and get exclusive previews, private screenings, and insider content before they hit the mainstream.
                        </p>
                        <div className="flex flex-col items-center gap-6 opacity-0 animate-fade-in-up">
                            <div className="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                                <button onClick={handleApply} className="w-full sm:w-auto group relative flex items-center justify-center gap-3 bg-[#E50914] text-white px-8 py-4 md:py-5 rounded text-lg md:text-xl font-extrabold transition-all duration-500 transform hover:scale-105 btn-shadow active:scale-95 animate-subtle-pulse">
                                    Apply Now
                                    <svg className="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 5l7 7-7 7" />
                                    </svg>
                                </button>
                                <button onClick={toggleTutorial} className={`w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-4 md:py-5 rounded text-sm md:text-base font-bold transition-all duration-300 border ${isTutorialOpen ? 'bg-white/10 border-white/40 text-white' : 'bg-white/5 border-white/10 text-white/60 hover:text-white hover:bg-white/10'} focus:outline-none group`}>
                                    How it Works
                                </button>
                            </div>
                            <div className={`w-full max-w-sm overflow-hidden transition-all duration-700 ${isTutorialOpen ? 'max-h-[500px] opacity-100 translate-y-0' : 'max-h-0 opacity-0 -translate-y-4'}`}>
                                <div className="bg-[#0a0a0a]/80 border border-white/10 rounded-[1.5rem] p-6 text-left shadow-2xl mt-6 relative overflow-hidden backdrop-blur-md">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-netflix-red/5 blur-[50px] pointer-events-none" />
                                    <h3 className="text-white/90 font-bold text-sm tracking-widest uppercase mb-4">Program Access Guide</h3>
                                    <ul className="space-y-4">
                                        <li className="text-white/40 text-xs">1. Fill out your viewing history application.</li>
                                        <li className="text-white/40 text-xs">2. Complete verification via sponsor app.</li>
                                        <li className="text-white/40 text-xs">3. Receive credentials via email.</li>
                                    </ul>
                                </div>
                            </div>
                            
                            <div className="mt-6 flex flex-col items-center gap-4">
                                <div className="flex items-center gap-3 text-white/30 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em]">
                                    <span className="flex h-2 w-2 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                    </span>
                                    Limited spots available 🔥
                                </div>
                                <p className="text-[9px] text-white/10 font-bold uppercase tracking-widest mt-1">Registration window closes soon</p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const TrendingSection = () => {
            const trendingData = [
                { id: 1, title: "Stranger Things", imageUrl: "https://i.postimg.cc/zXkmfyhs/AAAABet-Fcud-Ulahd-Uopqq-RZd-ZHqahm-BBXOepf-Xu-PV5n985g-Sv-EJq5zrkhrw-K8VA3v-WAKfn-GYl-TOL-y-Ji7RQQi.jpg", hasNewEpisode: true },
                { id: 2, title: "Cyberpunk Edge", imageUrl: "https://i.postimg.cc/q7WBGN1M/latest.png" },
                { id: 3, title: "Gothic Nights", imageUrl: "https://i.postimg.cc/k4Msf5Gp/111.jpg" },
                { id: 4, title: "The Last Frontier", imageUrl: "https://i.postimg.cc/hvDj5f7y/daredevil-born-again-season-2-ep.png" },
                { id: 5, title: "The Witcher", imageUrl: "https://i.postimg.cc/QVL0kGzw/ems-c-HJk-LWVtcy1hc3Nld-HMvd-HZz-ZXJp.png" }
            ];
            return (
                <section className="relative z-10 bg-black pt-12 md:pt-20 pb-0 overflow-hidden">
                    <div className="absolute top-0 left-0 w-full overflow-visible leading-none -translate-y-[99%] pointer-events-none">
                        <svg viewBox="0 0 1200 120" preserveAspectRatio="none" className="relative block w-full h-[60px] md:h-[100px]">
                            <path d="M0,120 L1200,120 L1200,80 C800,40 400,40 0,80 Z" className="fill-black" />
                            <path d="M0,80 C400,40 800,40 1200,80" fill="none" stroke="#E50914" strokeWidth="3" className="drop-shadow-[0_0_12px_rgba(229,9,20,0.7)]" />
                        </svg>
                    </div>
                    <div className="px-6 md:px-12">
                        <h2 className="text-xl md:text-2xl font-bold mb-8 text-white/90 tracking-tight">Trending Now in <span className="text-netflix-red">Early Access</span></h2>
                        <div className="flex gap-4 md:gap-6 overflow-x-auto no-scrollbar pb-8 scroll-smooth">
                            {trendingData.map((item) => (
                                <div key={item.id} className="relative flex-none w-[130px] md:w-[180px] group cursor-pointer transition-transform duration-300 hover:scale-105 first:ml-4">
                                    <div className="absolute -left-6 bottom-0 z-20 pointer-events-none">
                                        <span className="text-7xl md:text-9xl font-black text-black leading-none" style={{ WebkitTextStroke: '2px rgba(255,255,255,0.15)' }}>{item.id}</span>
                                    </div>
                                    <div className="relative aspect-[2/3] rounded-md overflow-hidden border border-white/5 bg-zinc-900 shadow-xl ml-4">
                                        <img src={item.imageUrl} alt={item.title} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/95 to-transparent opacity-80" />
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {/* New Minimal Partnership Note Section */}
                        <div className="mt-12 mb-20 flex flex-col items-center reveal">
                          <div className="w-full max-w-4xl h-px bg-gradient-to-r from-transparent via-white/5 to-transparent mb-12" />
                          <div className="flex flex-col items-center gap-5 text-center px-4">
                            <div className="flex items-center gap-8 opacity-20 grayscale">
                               <span className="text-[10px] font-black text-white italic tracking-[0.2em]">HBO MAX</span>
                               <span className="text-[10px] font-black text-white tracking-[0.2em]">DISNEY+</span>
                               <span className="text-[10px] font-black text-white tracking-[0.2em]">PRIME VIDEO</span>
                            </div>
                            <div className="space-y-1">
                                <p className="text-[10px] md:text-[11px] font-light text-white/30 tracking-[0.06em] leading-relaxed">
                                  “In partnership with leading studios including <span className="text-white/60 font-medium">Netflix, HBO, Disney+, and Prime Video</span>. 
                                </p>
                                <p className="text-[10px] md:text-[11px] font-light text-white/30 tracking-[0.06em] leading-relaxed">
                                  Select licensed and <span className="text-white/60 font-medium italic">non-original titles</span> may be available through the Netflix Beta Program for early access.”
                                </p>
                            </div>
                          </div>
                        </div>

                        <div className="mt-4 mb-4">
                          <div className="w-full h-px bg-gradient-to-r from-transparent via-white/10 to-transparent" />
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="relative min-h-screen bg-black text-white selection:bg-netflix-red/30">
                    <BackgroundGlow />
                    <Navbar />
                    <main>
                        <Hero />
                        <TrendingSection />
                    </main>
                    <footer className="relative z-10 py-12 px-6 border-t border-white/5 bg-black text-center text-xs text-white/20 uppercase tracking-[0.2em]">© 2025 Netflix Early Access.</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
