<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Early Access Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'netflix-red': '#E50914',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
        background-color: #000;
        color: white;
      }
      
      .cinematic-glow {
        background: radial-gradient(circle at 50% -20%, rgba(229, 9, 20, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
      }
      .bg-radial-vignette {
        background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,1) 100%);
      }
      .btn-shadow {
        box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
      }
      .btn-shadow:hover {
        box-shadow: 0 0 45px rgba(229, 9, 20, 0.7);
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(40px, -30px); }
      }

      @keyframes subtleDrift {
        0%, 100% { transform: perspective(1000px) rotateX(15deg) scale(1.1) translate(0, 0); }
        50% { transform: perspective(1000px) rotateX(15deg) scale(1.12) translate(-10px, -10px); }
      }

      @keyframes subtlePulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.03); filter: brightness(1.1); }
      }

      .animate-fade-in-up {
        animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-slide-down {
        animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-drift {
        animation: drift 20s ease-in-out infinite;
      }
      .animate-subtle-drift {
        animation: subtleDrift 30s ease-in-out infinite;
      }
      .animate-subtle-pulse {
        animation: subtlePulse 4s ease-in-out infinite;
      }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }

      .reveal {
        opacity: 0;
        transform: translateY(50px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .feature-card:hover {
        box-shadow: inset 0 0 30px rgba(229, 9, 20, 0.1), 0 0 50px rgba(229, 9, 20, 0.05);
        border-color: rgba(229, 9, 20, 0.4);
      }

      ::selection {
        background: #E50914;
        color: white;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
